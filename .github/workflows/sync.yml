name: sync-inventory

on:
  schedule:
    - cron: "*/10 * * * *"   # every ~10 minutes (GitHub may delay under load)
  workflow_dispatch:            # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: sync-inventory
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch live inventory
        run: python sync.py
      - name: Commit status.json if changed
        run: |
          if ! git diff --quiet -- status.json; then
            git config user.name "dira-sync-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add status.json
            git commit -m "chore: sync inventory status"
            git push
          else
            echo "no change in status.json"
          fi
